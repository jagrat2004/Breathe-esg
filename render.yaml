services:
  - type: web
    name: breathe-esg-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate --noinput && python seed_data.py || true && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

  - type: web
    name: breathe-esg-frontend
    env: static
    rootDir: frontend
    buildCommand: "REACT_APP_API_URL=https://breathe-esg-backend.onrender.com npm run build"
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: breathe-esg-db
    plan: free
